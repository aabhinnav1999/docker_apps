# Docker
# Build a Docker image
# https://docs.microsoft.com/azure/devops/pipelines/languages/docker

trigger:
  paths:
    include:
      - todo_django/*

resources:
- repo: self

variables:
  tag: '$(Build.BuildId)'

pool:
  name: newagents # change pool name to your agent pool

stages:
- stage: Build
  displayName: Build image
  jobs:
  - job: Build
    displayName: Build
    # pool:
      # vmImage: ubuntu-latest
    steps:
    - task: Docker@2
      displayName: Build an image
      inputs:
        command: build
        dockerfile: '$(Build.SourcesDirectory)/todo_django_app/Dockerfile'
        tags: |
          $(tag)
