<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>To-Do (Go)</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="/static/app.css" rel="stylesheet">
  </head>

  <body class="bg-dark text-white">
    <main class="container py-5" style="max-width: 860px;">
      <header class="mb-4">
        <h1 class="fw-bold">To-Do</h1>
        <div class="text-white-50">Go + SQLite • simple, persistent.</div>
      </header>

      <section class="card card-soft rounded-4 shadow-lg">
        <div class="p-4 border-bottom border-soft">

          <form class="d-flex gap-2" method="post" action="/add?filter={{.Filter}}">
            <input
              class="form-control form-control-lg bg-black border-0 text-white"
              name="text"
              maxlength="140"
              placeholder="Add a task… (Enter)"
              autofocus
              required
            />
            <button class="btn btn-light btn-lg fw-semibold" type="submit">Add</button>
          </form>

          <div class="d-flex flex-wrap justify-content-between align-items-center gap-3 mt-3">
            <div class="text-white-50">
              <span class="fw-semibold text-white">{{.ActiveCount}}</span> active •
              <span class="fw-semibold text-white">{{.CompletedCount}}</span> completed
            </div>

            <div class="btn-group" role="group" aria-label="filters">
              <a class="btn btn-outline-light btn-filter {{if eq .Filter "all"}}active{{end}}" href="/?filter=all">All</a>
              <a class="btn btn-outline-light btn-filter {{if eq .Filter "active"}}active{{end}}" href="/?filter=active">Active</a>
              <a class="btn btn-outline-light btn-filter {{if eq .Filter "completed"}}active{{end}}" href="/?filter=completed">Completed</a>
            </div>
          </div>
        </div>

        <ul class="list-group list-group-flush">
          {{if .Todos}}
            {{range .Todos}}
              <li class="list-group-item bg-transparent text-white d-flex align-items-center justify-content-between py-3 border-soft">
                <div class="d-flex align-items-center gap-3">
                  <form method="post" action="/toggle?filter={{$.Filter}}" class="m-0">
                    <input type="hidden" name="id" value="{{.ID}}">
                    <button class="btn btn-sm {{if .Completed}}btn-success{{else}}btn-outline-light{{end}}" type="submit">
                      {{if .Completed}}Done{{else}}Mark{{end}}
                    </button>
                  </form>

                  <div class="todo-text {{if .Completed}}completed{{end}}">
                    {{.Text}}
                  </div>
                </div>

                <form method="post" action="/delete?filter={{$.Filter}}" class="m-0">
                  <input type="hidden" name="id" value="{{.ID}}">
                  <button class="btn btn-sm btn-outline-danger" type="submit">Delete</button>
                </form>
              </li>
            {{end}}
          {{else}}
            <li class="list-group-item bg-transparent text-white-50 py-4 border-soft">
              No tasks here. Add one above 👆
            </li>
          {{end}}
        </ul>

        <div class="p-4 d-flex justify-content-between align-items-center gap-3">
          <form method="post" action="/clear-completed?filter={{.Filter}}" class="m-0">
            <button class="btn btn-link text-decoration-none text-white-50 p-0" type="submit">
              Clear completed
            </button>
          </form>
          <div class="text-white-50 small">Stored in SQLite: <code class="text-white-50">todo.sqlite</code></div>
        </div>
      </section>
    </main>
  </body>
</html>
